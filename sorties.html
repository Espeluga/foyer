<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('image/font.sortie.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Optionnel : assombrir un peu pour que le texte soit lisible */
        body::before {
            background: rgba(0, 0, 0, 0.5);
        }
    </style>

<body>

    <div class="top-banner">
        <a href="index.html">Accueil</a>

        <!-- Carrousel des filières -->
        <div class="carrousel-section">
            <div class="carrousel-header">
                <h2>Nos filières en images</h2>
                <div class="controles-carrousel">
                    <button class="btn-carrousel" id="leftFormation">◀ Left</button>
                    <button class="btn-carrousel" id="rightFormation">Right ▶</button>
                </div>
            </div>
            <div class="carrousel-container">
                <div class="carrousel left" id="carrouselFormation">
                    <div class="fenetre">
                        <img src="image/sortie.07.jpg" alt="  ">
                        <h3> </h3>
                    </div>
                    <div class="    ">  
                        <img src="image/sport.02.jpg" alt="BTP">
                        <h3>    </h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/sortie.jeune.laser.jpg" alt="  ">
                        <h3>  </h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/sortie.01.jpg" alt="  ">
                        <h3>  </h3>
                    </div>
                    <div class="   ">
                        <img src="image/sortie.05.jpg" alt="   ">
                        <h3>  </h3>
                    </div>
                    <!-- Duplication -->
                    <div class="fenetre">
                        <img src="image/atelier-cuisine.jpg" alt="Cuisine">
                        <h3>CAP Cuisine</h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/atelier-btp.jpg" alt="BTP">
                        <h3>Prépa BTP</h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/atelier-numerique.jpg" alt="Numérique">
                        <h3>Remise à niveau numérique</h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/atelier-commerce.jpg" alt="Commerce">
                        <h3>Vente & commerce</h3>
                    </div>
                    <div class="fenetre">
                        <img src="image/atelier-jardin.jpg" alt="Jardinage">
                        <h3>Jardinage & insertion</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lecteur audio (optionnel, comme dans Teddy) -->
        <div style="text-align: center; margin-top: 40px;">
            <div style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 50px; padding: 15px; display: inline-block; width: auto;">
                <p style="color: white; margin-bottom: 10px;">🎵 Musique d'ambiance</p>
                <audio controls>
                    <source src="musique/ambiance.mp3" type="audio/mpeg">
                    Ton navigateur ne supporte pas l'audio.
                </audio>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Foyer L'Espeluga – Pôle éducatif</p>
    </footer>

    <script>
        const carrousel = document.getElementById('carrouselFormation');
        document.getElementById('leftFormation').addEventListener('click', () => {
            carrousel.classList.remove('left', 'right');
            carrousel.classList.add('left');
        });
        document.getElementById('rightFormation').addEventListener('click', () => {
            carrousel.classList.remove('left', 'right');
            carrousel.classList.add('right');
        });
    </script>
</body>
</html>

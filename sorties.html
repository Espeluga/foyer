<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenirs - Foyer L'Espeluga</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('image/font.sortie.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        body::before {
            background: rgba(0, 0, 0, 0.5);
        }

        /* Style spécifique pour les fenêtres du carrousel souvenir */
        .fenetre-souvenir {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 20px;
            padding: 15px;
            width: 280px;
            flex-shrink: 0;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }
        .fenetre-souvenir:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffd700;
        }
        .fenetre-souvenir img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .fenetre-souvenir h3 {
            color: white;
            font-size: 1rem;
            margin: 0;
            font-weight: normal;
        }

        /* Conteneur du carrousel avec défilement horizontal */
        .carrousel-container {
            overflow-x: auto;
            scroll-behavior: smooth;
            white-space: nowrap;
            padding: 20px 0;
            scrollbar-width: thin;
        }
        .carrousel-container::-webkit-scrollbar {
            height: 6px;
        }
        .carrousel-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .carrousel-container::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        .carrousel {
            display: flex;
            gap: 20px;
            width: fit-content;
        }

        /* Boutons */
        .btn-carrousel {
            padding: 8px 20px;
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #ffd700;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }
        .btn-carrousel:hover {
            background: #ffd700;
            color: black;
        }
        .carrousel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        /* ===== LIGHTBOX (agrandissement des photos) ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .close-lightbox {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            background: none;
            border: none;
            font-weight: bold;
        }
        .close-lightbox:hover {
            color: #ffd700;
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <a href="index.html">Accueil</a>
        <a href="missions.html">Nos Missions</a>
        <a href="equipe.html">L'équipe éducative</a>
        <a href="espeluga.html">L'Espeluga</a>
        <a href="formation.html">Formation</a>
        <a href="animation.html">Animation</a>
        <a href="sorties.html">Souvenir</a>
    </div>

    <div class="container">
        <a href="index.html" class="bouton-retour">← Retour à l'accueil</a>
        <h1>📸 SOUVENIRS</h1>

        <div class="carrousel-section">
            <div class="carrousel-header">
                <h2>Nos moments forts</h2>
                <div class="controles-carrousel">
                    <button class="btn-carrousel" id="leftSouvenir">◀ Left</button>
                    <button class="btn-carrousel" id="rightSouvenir">Right ▶</button>
                </div>
            </div>
            <div class="carrousel-container" id="carrouselContainer">
                <div class="carrousel" id="carrouselSouvenir">
                    <div class="fenetre-souvenir">
                        <img src="image/sortie.07.jpg" alt="     ">
                        <h3>      </h3>
                    </div>
                    <div class="fenetre-souvenir">
                        <img src="image/sport.02.jpg" alt="     ">
                        <h3>      </h3>
                    </div>
                    <div class="fenetre-souvenir">
                        <img src="image/sortie.jeune.laser.jpg" alt="     ">
                        <h3>       </h3>
                    </div>
                    <div class="fenetre-souvenir">
                        <img src="image/sortie.01.jpg" alt="    ">
                        <h3>      </h3>
                    </div>
                    <div class="fenetre-souvenir">
                        <img src="image/sortie.05.jpg" alt="     ">
                        <h3>      </h3>
                    </div>
                    <!-- Tu peux ajouter autant de souvenirs que tu veux -->
                </div>
            </div>
        </div>

        <!-- Musique d'ambiance -->
        <div style="text-align: center; margin-top: 40px;">
            <div style="background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-radius: 50px; padding: 15px; display: inline-block; width: auto;">
                <p style="color: white; margin-bottom: 10px;">🎵 Musique d'ambiance</p>
                <audio controls>
                    <source src="musique/Bienvenue.02.mp3" type="audio/mpeg">
                    Ton navigateur ne supporte pas l'audio.
                </audio>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Foyer L'Espeluga – Pôle éducatif</p>
    </footer>

    <!-- LIGHTBOX : image agrandie au clic -->
    <div id="lightbox" class="lightbox">
        <button class="close-lightbox">&times;</button>
        <img class="lightbox-img" id="lightboxImg" src="" alt="Agrandissement">
    </div>

    <script>
        // Défilement du carrousel
        const container = document.getElementById('carrouselContainer');
        const leftBtn = document.getElementById('leftSouvenir');
        const rightBtn = document.getElementById('rightSouvenir');

        leftBtn.addEventListener('click', () => {
            container.scrollBy({ left: -300, behavior: 'smooth' });
        });
        rightBtn.addEventListener('click', () => {
            container.scrollBy({ left: 300, behavior: 'smooth' });
        });

        // ===== LIGHTBOX : agrandissement des photos au clic =====
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const closeBtn = document.querySelector('.close-lightbox');
        
        // Récupère toutes les images des fenêtres-souvenir
        const allImages = document.querySelectorAll('.fenetre-souvenir img');
        
        allImages.forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation();
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });
        
        // Fermer la lightbox au clic sur le bouton
        closeBtn.addEventListener('click', () => {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
        });
        
        // Fermer la lightbox au clic sur le fond noir
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            }
        });
        
        // Fermer avec la touche Échap
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
                lightboxImg.src = '';
            }
        });
    </script>
</body>
</html>

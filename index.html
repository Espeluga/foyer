<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Foyer L'Espeluga</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('image/font.05.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        
        /* Cache tout le contenu tant que le mot de passe n'est pas validé */
        #protected-content {
            display: none;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        /* Quand le contenu est affiché, on le met en colonne */
        #protected-content.show {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        
        /* Pour que le footer reste en bas */
        .content-wrapper {
            flex: 1;
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 28px;
            text-align: center;
            border: 1px solid #ffd700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .login-box h1 { color: #ffd700; margin-bottom: 0.5rem; }
        .login-box p { color: white; margin-bottom: 1.5rem; }
        .login-box input, .login-box button {
            padding: 0.8rem 1.2rem;
            margin: 0.5rem;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        .login-box input { background: white; }
        .login-box button {
            background: #ffd700;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .login-box button:hover { background: #ffaa00; transform: scale(1.02); }
        .error-message {
            color: #ff6666;
            margin-top: 1rem;
            display: none;
        }
        
        footer {
            margin-top: auto;
        }

        /* ===== LECTEUR MUSIQUE FLOTTANT ===== */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 8px 15px 8px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffd700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .music-player:hover {
            background: rgba(0, 0, 0, 0.85);
            border-color: #ffaa00;
        }
        .music-btn {
            background: #ffd700;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .music-btn:hover {
            background: #ffaa00;
            transform: scale(1.05);
        }
        .music-info {
            color: white;
            font-size: 12px;
            font-weight: 500;
            max-width: 120px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 500px) {
            .music-info { display: none; }
            .music-player { padding: 8px 12px; }
        }
    </style>
</head>
<body>

<!-- PAGE DE CONNEXION -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h1>🔒 Site privé</h1>
        <p>Réservé à l'équipe et aux jeunes du foyer</p>
        <input type="password" id="passwordInput" placeholder="Mot de passe" autofocus>
        <button onclick="checkPassword()">Se connecter</button>
        <div id="errorMsg" class="error-message">❌ Mot de passe incorrect</div>
    </div>
</div>

<!-- CONTENU PROTÉGÉ DU SITE -->
<div id="protected-content">
    <div class="top-banner">
        <a href="index.html">Accueil</a>
        <a href="missions.html">Nos Missions</a>
        <a href="equipe.html">L'équipe éducative</a>
        <a href="espeluga.html">L'Espeluga</a>
        <a href="formation.html">Formation</a>
        <a href="animation.html">Animation</a>
        <a href="sorties.html">Souvenir</a>
    </div>

    <!-- Contenu principal qui pousse le footer en bas -->
    <div class="content-wrapper">
        <section class="hero">
            <div class="hero-content">
                <h1>Foyer L'Espeluga</h1>
                <p>     </p>
            </div>
        </section>
    </div>

    <footer>
        <p>© 2026 Foyer L'Espeluga – Pôle éducatif</p>
    </footer>
</div>

<!-- LECTEUR MUSIQUE FLOTTANT -->
<div class="music-player" id="musicPlayer">
    <button class="music-btn" id="playPauseBtn">🔊</button>
    <span class="music-info" id="musicInfo">Musique d'ambiance</span>
</div>

<audio id="bgMusic" loop preload="auto">
    <source src="musique/Espeluga.mp3" type="audio/mpeg">
    <!-- Si tu veux une musique différente, change le chemin ici -->
</audio>

<script>
    // ⚠️ REMPLACE 'Chato9@06740' PAR LE MOT DE PASSE QUE TU VEUX
    const VALID_PASSWORD = 'Chato9@06740';
    
    // ===== GESTION DE LA MUSIQUE =====
    const audio = document.getElementById('bgMusic');
    const playPauseBtn = document.getElementById('playPauseBtn');
    let isPlaying = false;
    
    // Fonction pour lancer la musique (nécessite une interaction utilisateur)
    function startMusic() {
        if (!isPlaying) {
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '🔊';
                // Sauvegarde l'état dans localStorage
                localStorage.setItem('musicPlaying', 'true');
            }).catch(e => {
                console.log("Lecture auto bloquée, clique sur le bouton musique");
                playPauseBtn.textContent = '🔇';
            });
        }
    }
    
    // Lecture/Pause au clic sur le bouton
    playPauseBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            playPauseBtn.textContent = '🔇';
            localStorage.setItem('musicPlaying', 'false');
        } else {
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '🔊';
                localStorage.setItem('musicPlaying', 'true');
            }).catch(e => console.log("Erreur lecture"));
        }
    });
    
    // Restaurer l'état de la musique si elle était en cours
    if (localStorage.getItem('musicPlaying') === 'true') {
        audio.play().then(() => {
            isPlaying = true;
            playPauseBtn.textContent = '🔊';
        }).catch(() => {
            playPauseBtn.textContent = '🔇';
        });
    }
    
    // ===== GESTION DE LA CONNEXION =====
    function checkPassword() {
        const userPassword = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (userPassword === VALID_PASSWORD) {
            localStorage.setItem('site_authenticated', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            const protectedContent = document.getElementById('protected-content');
            protectedContent.style.display = 'flex';
            protectedContent.classList.add('show');
            // Lance la musique après connexion
            startMusic();
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('passwordInput').value = '';
        }
    }
    
    // Vérifie si l'utilisateur est déjà authentifié
    if (localStorage.getItem('site_authenticated') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
        const protectedContent = document.getElementById('protected-content');
        protectedContent.style.display = 'flex';
        protectedContent.classList.add('show');
        // Lance la musique si elle était en cours
        if (localStorage.getItem('musicPlaying') === 'true') {
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = '🔊';
            }).catch(() => {});
        }
    }
    
    // Appuyer sur Entrée dans le champ mot de passe
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>

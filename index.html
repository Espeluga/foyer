<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Foyer L'Espeluga</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('image/font.05.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Cache tout le contenu tant que le mot de passe n'est pas validé */
        #protected-content {
            display: none;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 28px;
            text-align: center;
            border: 1px solid #ffd700;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .login-box h1 { color: #ffd700; margin-bottom: 0.5rem; }
        .login-box p { color: white; margin-bottom: 1.5rem; }
        .login-box input, .login-box button {
            padding: 0.8rem 1.2rem;
            margin: 0.5rem;
            border-radius: 40px;
            border: none;
            font-size: 1rem;
        }
        .login-box input { background: white; }
        .login-box button {
            background: #ffd700;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .login-box button:hover { background: #ffaa00; transform: scale(1.02); }
        .error-message {
            color: #ff6666;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

<!-- PAGE DE CONNEXION -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h1>🔒 Site privé</h1>
        <p>Réservé à l'équipe et aux jeunes du foyer</p>
        <input type="password" id="passwordInput" placeholder="Mot de passe" autofocus>
        <button onclick="checkPassword()">Se connecter</button>
        <div id="errorMsg" class="error-message">❌ Mot de passe incorrect</div>
    </div>
</div>

<!-- CONTENU PROTÉGÉ DU SITE -->
<div id="protected-content">
    <div class="top-banner">
        <a href="index.html">Accueil</a>
        <a href="missions.html">Nos Missions</a>
        <a href="equipe.html">L'équipe éducative</a>
        <a href="espeluga.html">L'Espeluga</a>
        <a href="formation.html">Formation</a>
        <a href="animation.html">Animation</a>
        <a href="sorties.html">Souvenir</a>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1>Foyer L'Espeluga</h1>
            <p>Accompagnement éducatif, insertion et vivre‑ensemble pour les jeunes</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Foyer L'Espeluga – Pôle éducatif</p>
    </footer>
</div>

<script>
    // ⚠️ REMPLACE 'Espeluga2026' PAR LE MOT DE PASSE QUE TU VEUX
    const VALID_PASSWORD = 'Chato9@06740';
    
    function checkPassword() {
        const userPassword = document.getElementById('passwordInput').value;
        const errorMsg = document.getElementById('errorMsg');
        
        if (userPassword === VALID_PASSWORD) {
            // Mot de passe correct : on cache la page de connexion et on affiche le site
            localStorage.setItem('site_authenticated', 'true');
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('protected-content').style.display = 'block';
        } else {
            // Mot de passe incorrect
            errorMsg.style.display = 'block';
            document.getElementById('passwordInput').value = '';
        }
    }
    
    // Vérifie si l'utilisateur est déjà authentifié (localStorage)
    if (localStorage.getItem('site_authenticated') === 'true') {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('protected-content').style.display = 'block';
    }
    
    // Appuyer sur Entrée dans le champ mot de passe déclenche la vérification
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            checkPassword();
        }
    });
</script>

</body>
</html>

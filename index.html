<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - Foyer L'Espeluga</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Image de fond propre à l'accueil (remplace par ton image) */
        body {
            background-image: url('image/font.05.webp');
        }
        
        /* Ajustement pour placer le footer en bas */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }
        .contenu-accueil {
            flex: 1;
            text-align: center;
            padding: 3rem 1rem;
        }
        /* Style original du titre (hérité du hero précédent) */
        .contenu-accueil h1 {
            font-family: 'Bebas Neue', cursive;
            font-size: 5rem;
            background: linear-gradient(45deg, #FF5E00, #FF00FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }
        .contenu-accueil p {
            font-family: 'Inter', sans-serif;
            font-size: 1.3rem;
            color: white;
            font-weight: 500;
            max-width: 700px;
            margin: 0 auto;
            text-shadow: 1px 1px 2px black;
        }
        footer {
            margin-top: 0;
        }
        @media (max-width: 600px) {
            .contenu-accueil h1 { font-size: 3rem; }
            .contenu-accueil p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Bande de navigation (identique à toutes les pages) -->
    <div class="top-banner">
        <a href="index.html">Accueil</a>
        <a href="missions.html">Nos Missions</a>

        <a href="formation.html">Formation</a>
        <a href="animation.html">Animation</a>
        <a href="sorties.html">Souvenir</a>
    </div>

    <!-- Contenu : titre et phrase, juste sous la banderole -->
    <div class="contenu-accueil">
        <h1>Foyer L'Espeluga</h1>
        <p>Accompagnement éducatif, insertion et vivre‑ensemble pour les jeunes</p>
    </div>

    <!-- Footer en bas -->
    <footer>
        <p>© 2026 Foyer L'Espeluga – Pôle éducatif</p>
    </footer>
